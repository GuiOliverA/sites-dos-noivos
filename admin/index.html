<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Confirmações</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#f5f0ea">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        body {
            display: none;
        }
    </style>
</head>

<body>
    <main class="admin-page">
        <header class="admin-header">
            <div>
                <p class="admin-eyebrow">Acesso restrito</p>
                <h1>Confirmações de Presença</h1>
            </div>
            <button id="export-csv" class="btn-export" type="button">Exportar CSV</button>
        </header>

        <section class="summary-grid" aria-label="Resumo das confirmações">
            <article class="summary-card">
                <p class="summary-label">Total de confirmações</p>
                <p id="total-confirmacoes" class="summary-number">0</p>
            </article>
            <article class="summary-card">
                <p class="summary-label">Total de convidados</p>
                <p id="total-pessoas" class="summary-number">0</p>
            </article>
            <article class="summary-card">
                <p class="summary-label">Total de crianças</p>
                <p id="total-criancas" class="summary-number">0</p>
            </article>
            <article class="summary-card">
                <p class="summary-label">Saldo de vagas (limite 150)</p>
                <p id="saldo-vagas" class="summary-number">0</p>
                <p class="summary-note">Crianças até 5 anos não contabilizadas no limite</p>
            </article>
        </section>

        <section class="table-panel">
            <div class="table-toolbar">
                <label for="search-nome">Buscar por nome</label>
                <input id="search-nome" type="search" placeholder="Digite o nome..." autocomplete="off">
            </div>

            <p id="status" class="status-text" role="status" aria-live="polite">Carregando confirmações...</p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Acompanhantes</th>
                            <th>Crianças</th>
                            <th>Presença</th>
                            <th>Mensagem</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="confirmacoes-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ADMIN_PASSWORD = '@#Taine21';
        const ADMIN_SESSION_KEY = 'admin-auth-ok';

        const hasSessionAuth = sessionStorage.getItem(ADMIN_SESSION_KEY) === '1';
        if (!hasSessionAuth) {
            const typedPassword = window.prompt('Digite a senha de acesso ao painel admin:');

            if (typedPassword !== ADMIN_PASSWORD) {
                document.body.style.display = 'block';
                document.body.innerHTML = '<p>Acesso negado.</p>';
                throw new Error('Acesso negado.');
            }

            sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
        }

        document.body.style.display = 'block';

        const SUPABASE_URL = 'https://tummmtcgxaxhmdnclsxd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Hy43AwFo5rkRMwxABp8MQw_SBl9S2rr';
        const TABLE_NAME = 'confirmacoes';

        const elements = {
            totalConfirmacoes: document.getElementById('total-confirmacoes'),
            totalPessoas: document.getElementById('total-pessoas'),
            totalCriancas: document.getElementById('total-criancas'),
            saldoVagas: document.getElementById('saldo-vagas'),
            searchInput: document.getElementById('search-nome'),
            tableBody: document.getElementById('confirmacoes-body'),
            status: document.getElementById('status'),
            exportButton: document.getElementById('export-csv')
        };

        let allRecords = [];

        const normalizeText = (value) =>
            String(value || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');

        const escapeCsv = (value) => {
            const raw = String(value ?? '').replace(/"/g, '""');
            return `"${raw}"`;
        };

        const formatDate = (isoDate) => {
            if (!isoDate) return '-';
            const date = new Date(isoDate);
            if (Number.isNaN(date.getTime())) return '-';
            return new Intl.DateTimeFormat('pt-BR', {
                dateStyle: 'short',
                timeZone: 'America/Sao_Paulo'
            }).format(date);
        };

        const presenceLabel = (value) => {
            const text = normalizeText(value);
            if (text === 'sim') return 'Sim';
            if (text === 'nao' || text === 'não') return 'Não';
            return value || '-';
        };

        const renderSummary = (records) => {
            const totalConfirmacoes = records.length;
            const totalPessoas = records.reduce((sum, item) => {
                const acompanhantes = Number(item.acompanhantes) || 0;
                return sum + 1 + Math.max(0, acompanhantes);
            }, 0);
            const totalCriancas = records.reduce((sum, item) => {
                return sum + Math.max(0, Number(item.quantidade_criancas) || 0);
            }, 0);

            elements.totalConfirmacoes.textContent = String(totalConfirmacoes);
            elements.totalPessoas.textContent = String(totalPessoas);
            elements.totalCriancas.textContent = String(totalCriancas);
            elements.saldoVagas.textContent = String(150 - totalPessoas);
        };

        const createRow = (item) => {
            const tr = document.createElement('tr');
            const values = [
                item.nome || '-',
                String(Number(item.acompanhantes) || 0),
                String(Number(item.quantidade_criancas) || 0),
                presenceLabel(item.presenca),
                item.mensagem || '-',
                formatDate(item.criado_em)
            ];

            values.forEach((value) => {
                const td = document.createElement('td');
                td.textContent = value;
                tr.appendChild(td);
            });

            return tr;
        };

        const renderTable = (records) => {
            elements.tableBody.innerHTML = '';

            if (!records.length) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = '<td colspan="6" class="empty-row">Nenhuma confirmação encontrada.</td>';
                elements.tableBody.appendChild(emptyRow);
                return;
            }

            const fragment = document.createDocumentFragment();
            records.forEach((item) => fragment.appendChild(createRow(item)));
            elements.tableBody.appendChild(fragment);
        };

        const setStatus = (message, type) => {
            elements.status.textContent = message;
            elements.status.classList.remove('error', 'ok');
            if (type) {
                elements.status.classList.add(type);
            }
        };

        const applyFilter = () => {
            const term = normalizeText(elements.searchInput.value);
            const filtered = term
                ? allRecords.filter((item) => normalizeText(item.nome).includes(term))
                : allRecords;

            renderSummary(filtered);
            renderTable(filtered);

            if (filtered.length !== allRecords.length) {
                setStatus(`Mostrando ${filtered.length} de ${allRecords.length} confirmações.`, 'ok');
            } else {
                setStatus(`${allRecords.length} confirmações carregadas.`, 'ok');
            }
        };

        const exportCsv = () => {
            if (!allRecords.length) {
                setStatus('Não há dados para exportar.', 'error');
                return;
            }

            const header = ['Nome', 'Acompanhantes', 'Crianças', 'Presença', 'Mensagem', 'Data'];
            const lines = [header.map(escapeCsv).join(';')];

            allRecords.forEach((item) => {
                lines.push([
                    item.nome || '',
                    Number(item.acompanhantes) || 0,
                    Number(item.quantidade_criancas) || 0,
                    presenceLabel(item.presenca),
                    item.mensagem || '',
                    formatDate(item.criado_em)
                ].map(escapeCsv).join(';'));
            });

            const blob = new Blob([`\uFEFF${lines.join('\n')}`], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const dateTag = new Date().toISOString().slice(0, 10);
            link.href = url;
            link.download = `confirmacoes-${dateTag}.csv`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);

            setStatus('CSV exportado com sucesso.', 'ok');
        };

        const fetchConfirmacoes = async () => {
            const endpoint = `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=id,criado_em,nome,acompanhantes,quantidade_criancas,presenca,mensagem&order=criado_em.desc`;

            const response = await fetch(endpoint, {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || 'Falha ao carregar confirmações.');
            }

            return response.json();
        };

        const init = async () => {
            try {
                const records = await fetchConfirmacoes();
                allRecords = Array.isArray(records) ? records : [];
                applyFilter();
            } catch (error) {
                console.error('Erro ao buscar confirmações:', error);
                allRecords = [];
                renderSummary([]);
                renderTable([]);
                setStatus('Erro ao carregar confirmações. Verifique a conexão com o Supabase.', 'error');
            }
        };

        elements.searchInput.addEventListener('input', applyFilter);
        elements.exportButton.addEventListener('click', exportCsv);

        init();
    </script>
</body>

</html>
